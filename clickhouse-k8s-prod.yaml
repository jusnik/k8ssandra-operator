---
# =============================================================================
# ClickHouse Cluster Deployment -- Altinity Operator (CHI + CHK)
# =============================================================================
# This manifest defines a HA ClickHouse cluster using the Altinity ClickHouse
# Kubernetes Operator (v0.27.1). It replaces the previous single-node StatefulSet
# with:
#
#   1. ClickHouseKeeperInstallation (CHK) -- 3-node Keeper ensemble for Raft
#      consensus. ClickHouse Keeper is the recommended replacement for ZooKeeper.
#      3 nodes provide quorum tolerance for 1 node failure.
#
#   2. ClickHouseInstallation (CHI) -- 1 shard, 2 replicas of ClickHouse.
#      Uses ReplicatedMergeTree (enabled automatically by the operator when
#      zookeeper/keeper is configured). 2 replicas provide read scaling and
#      fault tolerance. The operator manages StatefulSets, Services, ConfigMaps,
#      and PVCs automatically.
#
#   3. Namespace + Secret -- created here (not operator-managed).
#
# Prerequisites:
#   - Altinity ClickHouse Operator installed (see clickhouse-operator.yaml)
#   - cert-manager installed (for operator webhooks)
#   - StorageClass `dpip-sc` available
#   - `ghcr-creds-v2` image pull secret in the `clickhouse` namespace
#
# Architecture:
#
#   +-------------------+     +-------------------+
#   | ClickHouse repl-0 |     | ClickHouse repl-1 |
#   | (ReplicatedMerge  |     | (ReplicatedMerge  |
#   |  Tree)            |     |  Tree)            |
#   +--------+----------+     +----------+--------+
#            |                           |
#            +-----------+---------------+
#                        |
#                   +----+----+
#                   | Keeper  |  3-node Raft ensemble
#                   | ensemble|  (keeper-0, keeper-1, keeper-2)
#                   +---------+
#
# The Altinity operator handles:
#   - StatefulSet creation and management
#   - Headless + ClusterIP Services (per cluster, per shard, per replica)
#   - ConfigMaps for ClickHouse configuration (auto-generated with
#     remote_servers, zookeeper, macros, etc.)
#   - Pod anti-affinity and topology spread (via podDistribution)
#   - Rolling updates and schema bootstrap
#
# Anti-affinity:
#   The operator does NOT automatically enforce pod anti-affinity. We define
#   podDistribution rules in the CHI and CHK specs below to ensure:
#     - No two ClickHouse pods share the same node (requiredDuringScheduling)
#     - No two Keeper pods share the same node (requiredDuringScheduling)
#   Additionally, topologySpreadConstraints ensure AZ spread.
# =============================================================================

---
# =============================================================================
# Namespace
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: clickhouse
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
    # CHANGED:: Istio sidecar injection NOT enabled. Data infrastructure namespaces
    # CHANGED:: (cassandra, kafka-cluster, cnpg-cluster, redis-cache) on this cluster
    # CHANGED:: do not use Istio injection. Only dpip-apps uses it. Keeping consistent.

---
# =============================================================================
# ServiceAccount -- for backup CronJobs and other clickhouse workloads
# =============================================================================
# The backup CronJobs in clickhouse-backup.yaml reference this ServiceAccount.
# CHANGED:: Added here because the Altinity operator does not create it.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: clickhouse
  namespace: clickhouse
  labels:
    app.kubernetes.io/instance: clickhouse
    app.kubernetes.io/managed-by: altinity-operator
    app.kubernetes.io/name: clickhouse
imagePullSecrets:
  - name: ghcr-creds-v2

---
# =============================================================================
# Secret -- ClickHouse credentials
# =============================================================================
# CHANGED:: The ClickHouse user is "clickhouse" (not "default"). The password
# CHANGED:: is stored base64-encoded in the Secret. In production, use a strong
# CHANGED:: password managed via External Secrets Operator / Vault.
apiVersion: v1
kind: Secret
metadata:
  name: clickhouse
  namespace: clickhouse
  labels:
    app.kubernetes.io/instance: clickhouse
    app.kubernetes.io/managed-by: altinity-operator
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/version: "24.8"
type: Opaque
data:
  # CHANGED:: ClickHouse username (base64-encoded). echo -n 'clickhouse' | base64 => Y2xpY2tocm91c2U=
  clickhouse-user: "Y2xpY2tocm91c2U="
  # REDACTED -- replace with a real base64-encoded password at deploy time.
  # echo -n 'YourStrongPassword!' | base64
  # CHANGED:: In production, use a strong password managed via External Secrets
  # CHANGED:: Operator / Vault, not a hardcoded Secret.
  clickhouse-password: "<BASE64_ENCODED_CLICKHOUSE_PASSWORD>"

---
# =============================================================================
# ClickHouseKeeperInstallation (CHK) -- 3-node Keeper ensemble
# =============================================================================
# ClickHouse Keeper provides Raft-based consensus for ReplicatedMergeTree.
# 3 nodes = quorum tolerance for 1 failure. For production, 3 is the minimum.
# Use 5 nodes for tolerance of 2 simultaneous failures.
#
# The operator creates a StatefulSet, headless Service, and ConfigMaps.
# Keeper listens on port 9181 (Raft) and 9234 (internal).
#
# Anti-affinity: pods are spread across nodes using podAntiAffinity (required)
# and topologySpreadConstraints (zone awareness, ScheduleAnyway).
# =============================================================================
apiVersion: "clickhouse-keeper.altinity.com/v1"
kind: "ClickHouseKeeperInstallation"
metadata:
  name: clickhouse-keeper
  namespace: clickhouse
  labels:
    app.kubernetes.io/instance: clickhouse
    app.kubernetes.io/managed-by: altinity-operator
    app.kubernetes.io/name: clickhouse-keeper
spec:
  defaults:
    templates:
      podTemplate: keeper-pod-template
      dataVolumeClaimTemplate: keeper-data-volume

  configuration:
    clusters:
      - name: keeper
        layout:
          replicasCount: 3

    # Keeper settings -- exposes Prometheus metrics on port 7000
    settings:
      logger/level: "information"
      logger/console: "true"
      listen_host: "0.0.0.0"
      keeper_server/four_letter_word_white_list: "*"
      keeper_server/coordination_settings/raft_logs_level: "information"
      prometheus/endpoint: "/metrics"
      prometheus/port: "7000"
      prometheus/metrics: "true"
      prometheus/events: "true"
      prometheus/asynchronous_metrics: "true"
      prometheus/status_info: "false"

  templates:
    podTemplates:
      - name: keeper-pod-template
        metadata:
          labels:
            app: clickhouse-keeper
            app.kubernetes.io/instance: clickhouse
            app.kubernetes.io/name: clickhouse-keeper
        spec:
          # Anti-affinity: no two Keeper pods on the same node
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: clickhouse-keeper
                  topologyKey: kubernetes.io/hostname
          # Zone spread: distribute Keeper pods across availability zones
          # Each line explained:
          #   maxSkew: 1
          #     -> The maximum allowed difference in pod count between any two
          #        topology domains (e.g., AZs). If adding a pod to AZ-a would make
          #        the skew > 1 (e.g., 2 in AZ-a, 0 in AZ-b), the scheduler tries
          #        to place it in AZ-b instead. Value of 1 = best-effort even spread.
          #   topologyKey: topology.kubernetes.io/zone
          #     -> The topology domain to spread across. This uses the node's
          #        AZ label. So pods are spread across availability zones, not
          #        just nodes. If your nodes don't have this label (e.g., single-AZ
          #        cluster), this constraint has no effect and is ignored.
          #   whenUnsatisfiable: ScheduleAnyway
          #     -> If the constraint CANNOT be satisfied (e.g., all nodes are in
          #        one AZ, so spreading across zones is impossible), schedule the
          #        pod ANYWAY rather than leaving it Pending. Use
          #        "DoNotSchedule" if you want pods to stay Pending when the
          #        spread constraint can't be met.
          #   labelSelector.matchLabels.app: clickhouse-keeper
          #     -> Only count pods with this label when computing the skew.
          #        So only Keeper pods are considered, not ClickHouse or other
          #        pods in the same namespace.
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  app: clickhouse-keeper
          securityContext:
            fsGroup: 101
            fsGroupChangePolicy: Always
          imagePullSecrets:
            - name: ghcr-creds-v2
          containers:
            - name: clickhouse-keeper
              # CHANGED:: Using the RBH GHCR registry (air-gapped). Original image:
              # CHANGED::   clickhouse/clickhouse-keeper:24.8 (Docker Hub)
              # CHANGED:: Mirrored to: ghcr.io/reserve-bank-innovation-hub/clickhouse-keeper:24.8
              # CHANGED:: Before applying, ensure this image is pushed to your GHCR.
              image: ghcr.io/reserve-bank-innovation-hub/clickhouse-keeper:24.8
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                privileged: false
                readOnlyRootFilesystem: true
                runAsGroup: 101
                runAsNonRoot: true
                runAsUser: 101
                seccompProfile:
                  type: RuntimeDefault
              ports:
                - name: keeper-client
                  containerPort: 9181
                - name: keeper-interserver
                  containerPort: 9234
                - name: keeper-metrics
                  containerPort: 7000
              resources:
                limits:
                  cpu: "2"
                  memory: 4Gi
                  ephemeral-storage: 1Gi
                requests:
                  cpu: "1"
                  memory: 1Gi
                  ephemeral-storage: 50Mi
              volumeMounts:
                - name: data
                  mountPath: /var/lib/clickhouse-keeper
                - name: empty-dir
                  mountPath: /tmp
                  subPath: tmp-dir
                - name: empty-dir
                  mountPath: /etc/clickhouse-keeper
                  subPath: conf-dir
          volumes:
            - name: empty-dir
              emptyDir: {}

    volumeClaimTemplates:
      - name: keeper-data-volume
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              # Keeper stores Raft logs + snapshots. 10Gi is sufficient for
              # most workloads. Increase if you have many replicated tables.
              storage: 10Gi
          storageClassName: dpip-sc

---
# =============================================================================
# ClickHouseInstallation (CHI) -- 1 shard, 2 replicas, ReplicatedMergeTree
# =============================================================================
# The Altinity operator manages the entire ClickHouse cluster lifecycle:
#   - Creates StatefulSet with 2 replicas
#   - Generates ClickHouse config with remote_servers, zookeeper/keeper,
#     macros, and distributed table definitions
#   - Creates headless + ClusterIP Services
#   - Handles rolling updates, scaling, and schema bootstrap
#
# With keeper reference configured, the operator automatically:
#   - Uses ReplicatedMergeTree engine for replicated tables
#   - Configures ZooKeeper/Keeper coordination for replica sync
#   - Sets up interserver communication for part exchange
#
# The operator creates the following Services automatically:
#   - <chi-name>                  -- ClusterIP (load-balanced across all replicas)
#   - <chi-name>-<cluster>-<shard>-<replica> -- per-replica headless
#
# Connection strings:
#   - Native TCP:  clickhouse:9000 (load-balanced)
#   - HTTP:       clickhouse:8123 (load-balanced)
#   - Per-replica: clickhouse-repl-0.clickhouse.svc:9000, etc.
#
# Anti-affinity:
#   podDistribution with ClickHouseAntiAffinity ensures no two ClickHouse
#   replicas share the same node. topologySpreadConstraints ensure AZ spread.
#   The operator handles this natively via podDistribution -- no manual
#   podAntiAffinity needed in the pod template.
# =============================================================================
apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: clickhouse
  namespace: clickhouse
  labels:
    app.kubernetes.io/instance: clickhouse
    app.kubernetes.io/managed-by: altinity-operator
    app.kubernetes.io/name: clickhouse
spec:
  defaults:
    templates:
      podTemplate: clickhouse-pod-template
      dataVolumeClaimTemplate: data-volume
      logVolumeClaimTemplate: log-volume
    replicasUseFQDN: "yes"

  configuration:
    # Reference the ClickHouseKeeperInstallation by name.
    # The operator discovers keeper endpoints automatically.
    zookeeper:
      keeper:
        name: clickhouse-keeper
        namespace: clickhouse
        # serviceType: "replicas" (default) -- one ZK node per keeper replica
      session_timeout_ms: 30000
      operation_timeout_ms: 10000

    # Users -- the operator generates users.xml ConfigMap
    # CHANGED:: User is "clickhouse" (not "default"). The password is set
    # CHANGED:: via the Secret above (clickhouse-password key).
    users:
      clickhouse/password: ""
      clickhouse/networks/ip: "::/0"
      clickhouse/access_management: "1"

    clusters:
      - name: cluster1
        layout:
          shardsCount: 1
          replicasCount: 2
        # Pod distribution -- anti-affinity at the cluster level
        # Ensures replicas of this cluster are not co-located on the same node
        podDistribution:
          - type: "ClickHouseAntiAffinity"
            scope: "Shard"
          - type: "ClickHouseAntiAffinity"
            scope: "Replica"

    # Settings -- expose Prometheus metrics on port 9363 (built-in)
    settings:
      prometheus/endpoint: "/metrics"
      prometheus/port: "9363"
      prometheus/metrics: "true"
      prometheus/events: "true"
      prometheus/asynchronous_metrics: "true"

  templates:
    podTemplates:
      - name: clickhouse-pod-template
        metadata:
          labels:
            app: clickhouse
            app.kubernetes.io/instance: clickhouse
            app.kubernetes.io/name: clickhouse
        spec:
          # Anti-affinity: no two ClickHouse pods on the same node
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: clickhouse
                  topologyKey: kubernetes.io/hostname
          # Zone spread: distribute ClickHouse pods across availability zones
          # Each line explained:
          #   maxSkew: 1
          #     -> The maximum allowed difference in pod count between any two
          #        topology domains (e.g., AZs). If adding a pod to AZ-a would make
          #        the skew > 1 (e.g., 2 in AZ-a, 0 in AZ-b), the scheduler tries
          #        to place it in AZ-b instead. Value of 1 = best-effort even spread.
          #   topologyKey: topology.kubernetes.io/zone
          #     -> The topology domain to spread across. This uses the node's
          #        AZ label. So pods are spread across availability zones, not
          #        just nodes. If your nodes don't have this label (e.g., single-AZ
          #        cluster), this constraint has no effect and is ignored.
          #   whenUnsatisfiable: ScheduleAnyway
          #     -> If the constraint CANNOT be satisfied (e.g., all nodes are in
          #        one AZ, so spreading across zones is impossible), schedule the
          #        pod ANYWAY rather than leaving it Pending. Use
          #        "DoNotSchedule" if you want pods to stay Pending when the
          #        spread constraint can't be met.
          #   labelSelector.matchLabels.app: clickhouse
          #     -> Only count pods with this label when computing the skew.
          #        So only ClickHouse pods are considered, not Keeper or other
          #        pods in the same namespace.
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  app: clickhouse
          securityContext:
            fsGroup: 101
            fsGroupChangePolicy: Always
          imagePullSecrets:
            - name: ghcr-creds-v2
          # Init container to fix volume ownership (ClickHouse runs as UID 101)
          initContainers:
            - name: init-volume
              # CHANGED:: Using the RBH GHCR registry (air-gapped). Original image:
              # CHANGED::   busybox:1.36 (Docker Hub)
              # CHANGED:: Mirrored to: ghcr.io/reserve-bank-innovation-hub/busybox-custom:1.36
              image: ghcr.io/reserve-bank-innovation-hub/busybox-custom:1.36
              command:
                - sh
                - -c
                - |
                  chown -R 101:101 /var/lib/clickhouse /var/log/clickhouse-server
                  chmod 750 /var/lib/clickhouse /var/log/clickhouse-server
              securityContext:
                runAsUser: 0
                runAsNonRoot: false
                allowPrivilegeEscalation: false
              volumeMounts:
                - name: data
                  mountPath: /var/lib/clickhouse
                - name: logs
                  mountPath: /var/log/clickhouse-server
          containers:
            - name: clickhouse
              # CHANGED:: Using the RBH GHCR registry (air-gapped). Original image:
              # CHANGED::   clickhouse/clickhouse-server:24.8 (Docker Hub)
              # CHANGED:: Mirrored to: ghcr.io/reserve-bank-innovation-hub/clickhouse-server:24.8
              # CHANGED:: Before applying, ensure this image is pushed to your GHCR.
              image: ghcr.io/reserve-bank-innovation-hub/clickhouse-server:24.8
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                  # NET_ADMIN + SYS_NICE recommended by ClickHouse docs for
                  # thread priority management and network config.
                  # IPC_LOCK for memory locking.
                  add:
                    - NET_ADMIN
                    - SYS_NICE
                    - IPC_LOCK
                privileged: false
                readOnlyRootFilesystem: true
                runAsGroup: 101
                runAsNonRoot: true
                runAsUser: 101
                seccompProfile:
                  type: RuntimeDefault
              env:
                - name: CLICKHOUSE_DB
                  value: "central_analytics"
                # CHANGED:: User is "clickhouse" (not "default"). Matches the
                # CHANGED:: clickhouse-user key in the Secret above.
                - name: CLICKHOUSE_USER
                  value: "clickhouse"
                - name: CLICKHOUSE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: clickhouse
                      key: clickhouse-password
                - name: POD_IP
                  valueFrom:
                    fieldRef:
                      fieldPath: status.podIP
                - name: POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
              # Liveness + readiness probes (operator also adds its own,
              # but these ensure Kubernetes-level health checking)
              livenessProbe:
                httpGet:
                  path: /ping
                  port: http
                initialDelaySeconds: 60
                periodSeconds: 30
                timeoutSeconds: 10
                failureThreshold: 5
              readinessProbe:
                httpGet:
                  path: /ping
                  port: http
                initialDelaySeconds: 30
                periodSeconds: 10
                timeoutSeconds: 10
                failureThreshold: 5
              # Graceful shutdown
              lifecycle:
                preStop:
                  exec:
                    command:
                      - bash
                      - -c
                      - clickhouse-client --query "SYSTEM SHUTDOWN" || true
              ports:
                - name: http
                  containerPort: 8123
                - name: tcp
                  containerPort: 9000
                - name: interserver
                  containerPort: 9009
                - name: metrics
                  containerPort: 9363
              resources:
                limits:
                  cpu: "4"
                  memory: 16Gi
                  ephemeral-storage: 2Gi
                requests:
                  cpu: "4"
                  memory: 8Gi
                  ephemeral-storage: 50Mi
              volumeMounts:
                - name: data
                  mountPath: /var/lib/clickhouse
                - name: logs
                  mountPath: /var/log/clickhouse-server
                - name: empty-dir
                  mountPath: /tmp
                  subPath: tmp-dir
                - name: empty-dir
                  mountPath: /etc/clickhouse-server
                  subPath: conf-dir
          volumes:
            - name: empty-dir
              emptyDir: {}

    volumeClaimTemplates:
      - name: data-volume
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              # Sized for 840M rows/day (400M feedback + 400M check_log + 40M failure).
              # 1-month TTL with LZ4 compression.
              # ~39.2 GB/day compressed x 30 days = ~1,177 GB + 20% merge/index
              # overhead = ~1,413 GB. dpip-sc supports volume expansion.
              storage: 1400Gi
          storageClassName: dpip-sc
      - name: log-volume
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
          storageClassName: dpip-sc
