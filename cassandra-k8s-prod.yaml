# apiVersion: v1
# kind: Namespace
# metadata:
#   name: cassandra
#   labels:
#     pod-security.kubernetes.io/enforce: privileged
#     pod-security.kubernetes.io/audit: privileged
#     pod-security.kubernetes.io/warn: privileged
# ---
# =============================================================================
# ServiceAccount -- Used to attach imagePullSecrets to Cassandra pods
# =============================================================================
# The k8ssandra-operator CRD does not have an imagePullSecrets field.
# Instead, we create a ServiceAccount with the imagePullSecret attached and
# reference it via spec.cassandra.serviceAccount in the K8ssandraCluster.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cassandra
  namespace: cassandra
imagePullSecrets:
  - name: ghcr-creds-v2
---
# =============================================================================
# Secret: Cassandra superuser password
# =============================================================================
# The k8ssandra-operator reads this secret to create the Cassandra superuser.
# Replace the placeholder with a real base64-encoded password:
#   echo -n 'YourStrongPassword!' | base64
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: cassandra-superuser
  namespace: cassandra
type: Opaque
data:
  password: "<BASE64_ENCODED_CASSANDRA_PASSWORD>"
  username: Y2Fzc2FuZHJh   # base64 of "cassandra" -- do not change
---
# =============================================================================
# K8ssandraCluster CRD -- The main resource
# =============================================================================
# This is the single resource that defines the entire Cassandra cluster.
# The k8ssandra-operator reconciles this and creates:
#   - CassandraDatacenter (cass-operator CRD) -> StatefulSet, Services, PDB
#
# Addons (Medusa, Reaper) can be enabled later via kubectl patch. See:
#   - cassandra-medusa.yaml
#   - cassandra-reaper.yaml
#
# Field reference: kubectl explain k8ssandracluster.spec.cassandra
# =============================================================================
apiVersion: k8ssandra.io/v1alpha1
kind: K8ssandraCluster
metadata:
  name: feedback-cluster
  namespace: cassandra
spec:
  # ---------------------------------------------------------------------------
  # Cassandra configuration
  # ---------------------------------------------------------------------------
  cassandra:
    # Cassandra server version (4.1.x or 5.0.x supported by k8ssandra-operator)
    serverVersion: "5.0.5"

    # Cluster name (maps to CASSANDRA_CLUSTER_NAME)
    clusterName: feedback_cluster

    # ---------------------------------------------------------------------------
    # ServiceAccount -- references the ServiceAccount above which has
    # ghcr-creds-v2 imagePullSecret attached. This is how Cassandra pods
    # pull from the private GHCR registry.
    # ---------------------------------------------------------------------------
    serviceAccount: cassandra

    # ---------------------------------------------------------------------------
    # Server image -- NOT set here. The cass-operator uses the image configured
    # via Helm values (global.imageConfig.types.cassandra). This points to the
    # cass-management-api image which includes Apache Cassandra + Management API.
    # The Management API (port 8080) is required by cass-operator to manage the
    # Cassandra process. Standard Cassandra images (e.g. Bitnami) do NOT include
    # the Management API and will NOT work with cass-operator.
    # ---------------------------------------------------------------------------

    # ---------------------------------------------------------------------------
    # Pod-level security context (fsGroup for volume ownership)
    # Cassandra runs as UID 999 in the cass-management-api image.
    # ---------------------------------------------------------------------------
    podSecurityContext:
      fsGroup: 999
      fsGroupChangePolicy: Always

    # ---------------------------------------------------------------------------
    # Container-level overrides for the cassandra container.
    # The cass-operator creates a container named "cassandra" -- we override
    # its securityContext here. This is the CRD-supported way to set
    # container security context (NOT via podTemplateSpec).
    # ---------------------------------------------------------------------------
    containers:
      - name: cassandra
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          privileged: false
          runAsNonRoot: true
          runAsUser: 999
          runAsGroup: 999
          seccompProfile:
            type: RuntimeDefault
      # server-system-logger is a sidecar injected by cass-operator for log
      # forwarding. The k8ssandra system-logger image is distroless (no
      # /etc/passwd). Without an explicit numeric runAsUser, containerd tries
      # to look up the image's default user in /etc/passwd and fails with
      # "no users found". Setting runAsUser/runAsGroup as numeric values
      # bypasses the /etc/passwd lookup.
      - name: server-system-logger
        securityContext:
          runAsUser: 999
          runAsGroup: 999
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault

    # ---------------------------------------------------------------------------
    # Storage configuration
    # ---------------------------------------------------------------------------
    storageConfig:
      cassandraDataVolumeClaimSpec:
        storageClassName: dpip-sc
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            # Sized for 400M CheckLog rows/day in Cassandra (1:1 with Feedback).
            # 400M x 50 bytes = 20 GB/day per node (RF=3).
            # 90 days (3-month TTL) = 1,800 GB + 30% overhead = ~2,340 GB.
            # dpip-sc supports volume expansion if more is needed later.
            storage: 2400Gi

    # ---------------------------------------------------------------------------
    # Datacenter / rack topology
    # ---------------------------------------------------------------------------
    datacenters:
      - metadata:
          name: dc1
        # Number of Cassandra nodes. 3 is the minimum for RF=3 quorum.
        size: 3
        # Rack configuration. For multi-zone, create multiple racks with
        # rack-level affinity. For single-zone, a single rack is fine.
        racks:
          - name: rack1
        # ---------------------------------------------------------------------------
        # JVM and Cassandra configuration
        # ---------------------------------------------------------------------------
        # Field names must match the CRD schema exactly.
        #   kubectl explain k8ssandracluster.spec.cassandra.datacenters.config.jvmOptions
        # ---------------------------------------------------------------------------
        config:
          cassandraYaml:
            # Use GossipingPropertyFileSnitch for topology awareness
            endpoint_snitch: GossipingPropertyFileSnitch
            # num_tokens: 16 is recommended for Cassandra 4.x+ (256 is legacy)
            num_tokens: 16
            # Enable auto-compaction on startup
            auto_compaction: true
          jvmOptions:
            # Heap size (sets both -Xms and -Xmx). Deprecated in CRD but valid.
            # Prefer heap_initial_size and heap_max_size for new deployments.
            heapSize: "6G"
            # Young gen size (deprecated, CMS-only). For G1GC, G1 manages young
            # gen automatically. Set this only if you need explicit control.
            heapNewGenSize: "2G"
            # Garbage collector -- G1GC is default for Cassandra 4.x+
            gc: G1GC
            # G1GC tuning (CRD-native fields, not raw -XX flags)
            gc_g1_max_gc_pause_ms: 200
            gc_g1_parallel_threads: 6
            gc_g1_conc_threads: 3
        # ---------------------------------------------------------------------------
        # Resource limits (6 CPU / 24Gi for 1.5x headroom at peak hour)
        # ---------------------------------------------------------------------------
        resources:
          requests:
            cpu: "3"
            memory: 12Gi
          limits:
            cpu: "6"
            memory: 24Gi
        # ---------------------------------------------------------------------------
        # Networking
        # ---------------------------------------------------------------------------
        networking:
          hostNetwork: false

  # ---------------------------------------------------------------------------
  # Addons (Medusa, Reaper) -- NOT included in this core manifest.
  # Enable them separately by applying:
  #   - cassandra-medusa.yaml  (backup/restore sidecar)
  #   - cassandra-reaper.yaml  (automated repair)
  # See those files for kubectl patch instructions.
  # ---------------------------------------------------------------------------

# =============================================================================
# END of K8ssandraCluster spec
# =============================================================================
